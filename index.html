
<style>
  .ci-wrap { padding: 1.5rem 0; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-text-secondary); }
  .ctrl-val { font-weight: 500; color: var(--color-text-primary); }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
  .metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .metric-val.green { color: #1D9E75; }
  .legend { display: flex; gap: 20px; margin-bottom: 8px; font-size: 12px; color: var(--color-text-secondary); }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; }
</style>

<div class="ci-wrap">
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Initial investment</span><span class="ctrl-val" id="pv-out">$1,000</span></div>
      <input type="range" id="pv" min="100" max="50000" step="100" value="1000">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Annual interest rate</span><span class="ctrl-val" id="rate-out">8%</span></div>
      <input type="range" id="rate" min="1" max="20" step="1" value="8">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Time period</span><span class="ctrl-val" id="years-out">20 years</span></div>
      <input type="range" id="years" min="1" max="50" step="1" value="20">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Compounding frequency</span><span class="ctrl-val" id="freq-out">Annually</span></div>
      <input type="range" id="freq" min="1" max="4" step="1" value="1">
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Amount invested</div>
      <div class="metric-val" id="m-invested">$1,000</div>
    </div>
    <div class="metric">
      <div class="metric-label">Interest earned</div>
      <div class="metric-val green" id="m-interest">$3,661</div>
    </div>
    <div class="metric">
      <div class="metric-label">Final balance</div>
      <div class="metric-val" id="m-final">$4,661</div>
    </div>
  </div>

  <div class="legend">
    <span><span class="leg-dot" style="background:#378ADD"></span>Principal</span>
    <span><span class="leg-dot" style="background:#1D9E75"></span>Interest earned</span>
  </div>
  <div style="position: relative; width: 100%; height: 280px;">
    <canvas id="ciChart"></canvas>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const freqLabels = ['', 'Annually', 'Semi-annually', 'Quarterly', 'Monthly'];
  const freqVals = [0, 1, 2, 4, 12];

  function calc(pv, rate, years, freq) {
    const r = rate / 100;
    const n = freqVals[freq];
    const labels = [];
    const principal = [];
    const interest = [];
    for (let y = 0; y <= years; y++) {
      labels.push(y === 0 ? 'Now' : 'Y' + y);
      principal.push(pv);
      let fv;
      if (n === 1) {
        fv = pv * Math.pow(1 + r, y);
      } else {
        fv = pv * Math.pow(1 + r / n, n * y);
      }
      interest.push(Math.round(fv - pv));
    }
    return { labels, principal, interest };
  }

  let pv = 1000, rate = 8, years = 20, freq = 1;

  const ctx = document.getElementById('ciChart').getContext('2d');
  const data = calc(pv, rate, years, freq);
  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.labels,
      datasets: [
        { label: 'Principal', data: data.principal, backgroundColor: '#378ADD', stack: 's' },
        { label: 'Interest', data: data.interest, backgroundColor: '#1D9E75', stack: 's' }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: {
          label: ctx => ' $' + ctx.parsed.y.toLocaleString()
        }
      }},
      scales: {
        x: { stacked: true, ticks: { autoSkip: true, maxTicksLimit: 11, font: { size: 11 } }, grid: { display: false } },
        y: { stacked: true, ticks: { callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v), font: { size: 11 } }, grid: { color: 'rgba(128,128,128,0.15)' } }
      }
    }
  });

  function update() {
    const d = calc(pv, rate, years, freq);
    chart.data.labels = d.labels;
    chart.data.datasets[0].data = d.principal;
    chart.data.datasets[1].data = d.interest;
    chart.update();

    const finalVal = pv + d.interest[d.interest.length - 1];
    document.getElementById('m-invested').textContent = '$' + pv.toLocaleString();
    document.getElementById('m-interest').textContent = '$' + d.interest[d.interest.length - 1].toLocaleString();
    document.getElementById('m-final').textContent = '$' + finalVal.toLocaleString();
  }

  document.getElementById('pv').addEventListener('input', e => {
    pv = +e.target.value;
    document.getElementById('pv-out').textContent = '$' + pv.toLocaleString();
    update();
  });
  document.getElementById('rate').addEventListener('input', e => {
    rate = +e.target.value;
    document.getElementById('rate-out').textContent = rate + '%';
    update();
  });
  document.getElementById('years').addEventListener('input', e => {
    years = +e.target.value;
    document.getElementById('years-out').textContent = years + ' years';
    update();
  });
  document.getElementById('freq').addEventListener('input', e => {
    freq = +e.target.value;
    document.getElementById('freq-out').textContent = freqLabels[freq];
    update();
  });
</script>
